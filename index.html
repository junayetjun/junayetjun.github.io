<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Valentine?</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="container">
        <!-- Page 1 -->
        <div id="page1" class="card">
            <div class="photo-container">
                <img id="valentinePhoto" src="valentine_photo.png" alt="Valentine's Day"
                    onerror="this.src='https://images.unsplash.com/photo-1518199266791-5375a83190b7?q=80&w=1000&auto=format&fit=crop'">
            </div>
            <h1 class="question">Will you be my Valentine and can you please go out with me today Rakshanda ?</h1>
            <div class="button-group">
                <button id="yesBtn" class="btn yes">Yes</button>
                <button id="noBtn" class="btn no">No</button>
            </div>
        </div>

        <!-- Page 2 -->
        <div id="page2" class="card hidden">
            <div class="success-content">
                <div class="heart-animation">❤️</div>
                <h1 class="message">Thank you Jaan I Love you Jun..</h1>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
